<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>播放语音</title>
<style>
body{margin:0;height:100%;background:#111;display:flex;align-items:center;justify-content:center;font:19px system-ui;color:#fff}
.box{text-align:center}
button{padding:16px 44px;border:none;border-radius:14px;background:#0a84ff;color:#fff;font:20px system-ui}
audio{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);width:88%}
</style>
</head>
<body>
<div class="box">
  <p id="title" style="opacity:.55;margin-bottom:4px">🎵 语音消息
  <button onclick="playAudio()">▶ 点一下播放</button>
</div>

<audio id="a" preload="auto"></audio>

<script>
  // 1. 从链接里读取 ?n= 的参数
  const params = new URLSearchParams(window.location.search);
  let name = params.get('n') || '宝贝'; 

  // 2. 设置音频文件路径（文件在根目录，直接写文件名）
  const audioEl = document.getElementById('a');
  audioEl.src = encodeURIComponent(name) + '.m4a';

  // 3. 更新页面文字
  document.getElementById('title').innerText = '🎵 ' + name;

  // 4. 播放函数
  function playAudio() {
    audioEl.muted = false;
    audioEl.play().catch(e => console.log(e));
  }

  // 5. 尝试自动播放
  audioEl.play().catch(()=>{});
</script>
</body>
</html>
