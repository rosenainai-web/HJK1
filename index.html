<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>播放</title>
<style>
body{margin:0;min-height:100vh;background:#111;display:flex;align-items:center;justify-content:center;font:18px/1.4 -apple-system,BlinkMacSystemFont,sans-serif;color:#fff;text-align:center;padding:20px}
.btn{padding:14px 40px;border:none;border-radius:14px;background:#0a84ff;color:#fff;font-size:20px;cursor:pointer}
audio{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);width:90%;max-width:480px}
.status{opacity:.5;margin-bottom:18px;word-break:break-all}
</style>
</head>
<body>
<div class="status" id="label">🎵 加载中…</div>
<button class="btn" id="btn" onclick="play()">▶ 点一下播放</button>
<audio id="pl" preload="metadata"></audio>

<script>
const p=new URLSearchParams(location.search);
let n=p.get('n')||'宝贝';
n=decodeURIComponent(n);
document.getElementById('label').innerText='🎵 '+n;
const a=document.getElementById('pl');
a.src=encodeURIComponent(n)+'.m4a';

function play(){
  a.play().catch(()=>{});
}
// iOS解锁（点屏幕任意处也触发播放）
document.body.addEventListener('click',function u(){
  a.play();
  document.body.removeEventListener('click',u);
},{once:true});
</script>
</body>
</html>
